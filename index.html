<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #1c1c1e;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 { text-align: center; color: white; }

.card {
  background: #2c2c2e;
  color: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #3a3a3c;
  color: white;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-main { background: #007aff; }
.btn-embarcar { background: #34c759; }

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  background: #3a3a3c;
  text-align: center;
  cursor: pointer;
}

.kid.active { background: #007aff; }

.label {
  margin-top: 10px;
  font-weight: bold;
  color: #ff9f0a;
}

.car {
  border-bottom: 1px solid #444;
  padding: 10px 0;
}

.hora18 { color: #5ac8fa; }
.hora19 { color: #007aff; }
</style>
</head>

<body>

<h1>⛴️ Barcas do Pedra Bonita</h1>

<div class="card">

<select id="motorista">
<option disabled selected>Selecione a família</option>
<option>Carmen/João</option>
<option>Denise/Telmo</option>
<option>Karina/Jéferson</option>
<option>Natália/Pedro</option>
<option>Vanessa/Cris</option>
</select>

<select id="dia">
<option disabled selected>Selecione o dia</option>
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
</select>

<select id="destino" onchange="toggleHorario()">
<option disabled selected>Selecione a Origem/Destino</option>
<option>Escola</option>
<option>Futsal</option>
</select>

<select id="tipo" onchange="toggleHorario()">
<option disabled selected>Selecione o Trajeto</option>
<option value="Levar">Ida</option>
<option value="Buscar">Volta</option>
</select>

<div id="horarioContainer" style="display:none;">
<select id="horario">
<option disabled selected>Selecione o Horário</option>
<option>18h</option>
<option>19h</option>
</select>
</div>

<button class="btn-main" onclick="confirmar()">✅ Confirmar Carona?</button>

</div>

<div class="card">
<b>📚 Escola</b>
<div id="escola"></div>
</div>

<div class="card">
<b>⚽ Futsal</b>
<div id="futsal"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzZeQKg_1NaJSWvNye7iHCtcRsZWdwd5fJVvfufT7WB0FZ6PAGzaVh4rQmR8VUW9SwgQg/exec";
const kidsLista = ["José","João","Joaquim","Beni","Bento","Finkler"];

function toggleHorario(){
  horarioContainer.style.display =
    (destino.value==="Escola" && tipo.value==="Buscar")?"block":"none";
}

function confirmar(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      motorista:motorista.value,
      dia:dia.value,
      tipo:tipo.value,
      destino:destino.value,
      horario:horario.value,
      kids:[]
    })
  }).then(()=>setTimeout(load,600));
}

function embarcar(linha, container){
  const selecionados = [];

  container.querySelectorAll(".kid.active").forEach(k=>{
    selecionados.push(k.innerText);
  });

  if(!selecionados.length){
    alert("Seleciona pelo menos 1 piá");
    return;
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      dia:linha[0],
      destino:linha[1],
      motorista:linha[2],
      tipo:linha[3],
      horario:linha[5],
      kids:selecionados
    })
  }).then(()=>setTimeout(load,600));
}

function load(){
  fetch(URL).then(r=>r.json()).then(data=>{
    escola.innerHTML="";
    futsal.innerHTML="";

    data.slice().reverse().forEach(l=>{
      if(!l[0]) return;

      const div = document.createElement("div");
      div.className = "car";

      div.innerHTML = `
      <b>${l[0]} - <span class="${l[5]=='18h'?'hora18':'hora19'}">${l[5]}</span> - ${l[1]} (${l[3]})</b><br>
      ${l[2]}<br>
      ${l[4]?l[4].split(", ").map(k=>"→ "+k).join("<br>"):"<i>Nenhuma criança ainda</i>"}
      `;

      const label = document.createElement("div");
      label.className="label";
      label.innerText="Quem vai nessa Barca?";
      div.appendChild(label);

      const kidsDiv = document.createElement("div");
      kidsDiv.className="kids";

      kidsLista.forEach(k=>{
        const el = document.createElement("div");
        el.className="kid";
        el.innerText=k;

        el.onclick=()=>el.classList.toggle("active");
        kidsDiv.appendChild(el);
      });

      div.appendChild(kidsDiv);

      const btn = document.createElement("button");
      btn.className="btn-embarcar";
      btn.innerText="🚐 Embarcar";
      btn.onclick=()=>embarcar(l, div);

      div.appendChild(btn);

      (l[1]=="Escola"?escola:futsal).appendChild(div);
    });
  });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

load();
</script>

</body>
</html>
